<!doctype html>
<html lang="ko">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Tetra Portal | 지출 등록</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" crossorigin="anonymous" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="./css/adminlte.css" />
    <link rel="stylesheet" href="./css/typography-ko.css" />
    <link rel="stylesheet" href="./css/tetra-brand.css" />
    <script src="./js/utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" crossorigin="anonymous"></script>
    <style>
      .expense-registration .card { border-radius: 0.5rem; border: none; box-shadow: 0 0.125rem 0.5rem rgba(0,0,0,0.06); }
    </style>
  </head>
  <body class="layout-fixed sidebar-expand-lg sidebar-open bg-body-tertiary">
    <div class="app-wrapper expense-registration">
      <nav class="app-header navbar navbar-expand bg-body shadow-sm">
        <div class="container-fluid">
          <ul class="navbar-nav">
            <li class="nav-item"><a class="nav-link" data-lte-toggle="sidebar" href="#" role="button"><i class="bi bi-list"></i></a></li>
            <li class="nav-item d-none d-md-block"><a href="./manager.html" class="nav-link fw-semibold">지출 등록</a></li>
          </ul>
          <ul class="navbar-nav ms-auto align-items-center gap-2">
            <li class="nav-item"><span class="nav-link text-dark" id="header-role-label">-</span></li>
            <li class="nav-item"><button type="button" class="btn btn-outline-secondary btn-sm" id="logout-btn">로그아웃</button></li>
          </ul>
        </div>
      </nav>

      <aside class="app-sidebar bg-body-secondary shadow" data-bs-theme="dark" id="tetra-sidebar-aside">
        <div id="tetra-sidebar-inject"></div>
      </aside>

      <main class="app-main">
        <div class="app-content-header">
          <div class="container-fluid">
            <div class="row">
              <div class="col-sm-6"><h3 class="mb-0">지출 등록</h3></div>
              <div class="col-sm-6">
                <ol class="breadcrumb float-sm-end mb-0">
                  <li class="breadcrumb-item"><a href="./home.html">홈</a></li>
                  <li class="breadcrumb-item"><a href="./manager.html">현장 운영</a></li>
                  <li class="breadcrumb-item active">지출 등록</li>
                </ol>
              </div>
            </div>
          </div>
        </div>
        <div class="app-content">
          <div class="container-fluid">
            <div class="row justify-content-center">
              <div class="col-12 col-lg-10">
                <div class="card card-primary card-outline">
                  <div class="card-header">
                    <h3 class="card-title mb-0"><i class="bi bi-plus-circle-fill me-2"></i>지출 추가</h3>
                  </div>
                  <div class="card-body">
                    <form id="expense-form" target="hidden_iframe" action="https://script.google.com/macros/s/AKfycbzFf_YuMxN3hkpPW6sFRKoblztRRf9yfrUMo6BJZ-WeFzYUNQHq4FybW3R_LnzwP9IxxA/exec" method="POST">
                      <input type="hidden" name="action" value="upsertExpense" />
                      <div class="row g-3">
                        <div class="col-md-6 col-lg-2">
                          <label for="expenseDate" class="form-label">날짜</label>
                          <input type="date" class="form-control form-control-lg" id="expenseDate" name="date" required />
                        </div>
                        <div class="col-md-6 col-lg-2">
                          <label for="category" class="form-label">구분</label>
                          <select class="form-select form-select-lg" id="category" name="category" required>
                            <option value="">선택</option>
                            <option value="Food">식대</option>
                            <option value="Supplies">비품</option>
                            <option value="Rent">임대료</option>
                            <option value="Electricity">전기</option>
                            <option value="Internet">인터넷</option>
                            <option value="Others">기타</option>
                          </select>
                        </div>
                        <div class="col-md-6 col-lg-2">
                          <label for="staffSelect" class="form-label">직원 선택 <span class="text-danger">*</span></label>
                          <select class="form-select form-select-lg" id="staffSelect" required>
                            <option value="">선택</option>
                          </select>
                          <input type="hidden" name="staff_id" id="staffIdInput" />
                          <input type="hidden" name="staff_name" id="staffNameInput" />
                        </div>
                        <div class="col-md-6 col-lg-2">
                          <label for="item" class="form-label">항목</label>
                          <input type="text" class="form-control form-control-lg" id="item" name="item" placeholder="항목명" required />
                        </div>
                        <div class="col-md-6 col-lg-2">
                          <label for="cost" class="form-label">금액 (PHP)</label>
                          <input type="number" class="form-control form-control-lg" id="cost" name="cost" placeholder="0" min="0" step="0.01" required />
                        </div>
                        <div class="col-md-6 col-lg-2">
                          <label for="remarks" class="form-label">비고</label>
                          <input type="text" class="form-control form-control-lg" id="remarks" name="remarks" />
                        </div>
                        <div class="col-12">
                          <button type="submit" class="btn btn-primary btn-lg"><i class="bi bi-check2-square me-1"></i>지출 저장</button>
                        </div>
                      </div>
                    </form>
                  </div>
                </div>

                <div class="card mt-4">
                  <div class="card-header">
                    <h5 class="card-title mb-0 small"><i class="bi bi-clock-history me-1"></i>내 지출 등록 이력 (최근 5건)</h5>
                  </div>
                  <div class="card-body p-0">
                    <table class="table table-sm table-bordered mb-0">
                      <thead class="table-light"><tr><th>날짜</th><th>구분</th><th>항목</th><th>금액 (PHP)</th></tr></thead>
                      <tbody id="my-expense-tbody">
                        <tr><td colspan="4" class="text-center text-muted py-3">로딩 중...</td></tr>
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>

      <footer class="app-footer">
        <div class="float-end d-none d-sm-inline">Tetra Portal</div>
        <strong>Copyright &copy; 2014-2025 <a href="https://adminlte.io" class="text-decoration-none">AdminLTE.io</a>.</strong>
      </footer>
    </div>
    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="./js/routes.js"></script>
    <script src="./js/adminlte.js"></script>
    <script src="./js/sidebar-master.js"></script>
    <script src="./js/sidebar-static.js"></script>
    <script src="./js/header-role.js"></script>
    <script>
      (function () {
        const role = localStorage.getItem('role');
        if (!role || role === 'Worker') {
          window.location.href = './login.html';
          return;
        }
        if (role === 'Admin') {
          window.location.replace('./expense_management.html');
          return;
        }
      })();
      const API_URL = 'https://script.google.com/macros/s/AKfycbzFf_YuMxN3hkpPW6sFRKoblztRRf9yfrUMo6BJZ-WeFzYUNQHq4FybW3R_LnzwP9IxxA/exec';

      document.getElementById('user-label').textContent = '매니저: ' + (localStorage.getItem('userName') || '-');
      document.getElementById('logout-btn').addEventListener('click', function () {
        localStorage.removeItem('userName'); localStorage.removeItem('role'); localStorage.removeItem('userId');
        location.href = './login.html';
      });

      document.getElementById('expenseDate').value = new Date().toISOString().slice(0, 10);

      function sortStaffByRoleThenName(arr) {
        const roleOrder = { Admin: 0, Manager: 1, Worker: 2 };
        return [...arr].sort((a, b) => {
          const ra = roleOrder[(a.role || '').toString().trim()] ?? 3;
          const rb = roleOrder[(b.role || '').toString().trim()] ?? 3;
          if (ra !== rb) return ra - rb;
          const na = (a.name || a.userName || a.user_name || a.userId || '').toString().trim();
          const nb = (b.name || b.userName || b.user_name || b.userId || '').toString().trim();
          return (na || '').localeCompare(nb || '', 'ko');
        });
      }

      async function loadStaffList() {
        try {
          const res = await fetch(API_URL + '?action=getApprovedUsers');
          const data = await res.json();
          const users = data.users || data.data || [];
          let list = Array.isArray(users) ? users : [];
          const curUserId = localStorage.getItem('userId') || '';
          const curName = localStorage.getItem('userName') || '';
          const inList = list.some(u => (u.userId || u.user_id || '').toString().trim() === curUserId);
          if (!inList && curUserId) list = [{ userId: curUserId, name: curName || curUserId }, ...list];
          list = sortStaffByRoleThenName(list);
          const sel = document.getElementById('staffSelect');
          sel.innerHTML = '<option value="">선택</option>' + list.map(u => {
            const id = u.userId || u.user_id || u.id || '';
            const name = u.name || u.userName || u.user_name || id;
            return '<option value="' + id.replace(/"/g, '&quot;') + '" data-name="' + (name || '').replace(/"/g, '&quot;') + '">' + (name || '-') + ' (' + (id || '-') + ')</option>';
          }).join('');
          sel.onchange = function () {
            const opt = this.options[this.selectedIndex];
            document.getElementById('staffIdInput').value = this.value || '';
            document.getElementById('staffNameInput').value = opt?.dataset?.name || '';
          };
          const idx = list.findIndex(u => (u.userId || u.user_id || '').toString().trim() === curUserId);
          if (idx >= 0) { sel.selectedIndex = idx + 1; sel.dispatchEvent(new Event('change')); }
        } catch (e) { console.error('loadStaffList failed:', e); }
      }

      async function loadMyExpenses() {
        const tbody = document.getElementById('my-expense-tbody');
        const curUserId = localStorage.getItem('userId') || '';
        try {
          const res = await fetch(API_URL + '?action=getMyExpenses&userId=' + encodeURIComponent(curUserId) + '&limit=5');
          const data = await res.json();
          const rows = data.expenses || data.data || [];
          const list = Array.isArray(rows) ? rows : [];
          if (list.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-3">등록한 지출이 없습니다.</td></tr>';
            return;
          }
          tbody.innerHTML = list.map(e => {
            const date = e.date || e.Date || '-';
            const cat = e.category || e.Category || '-';
            const item = e.item || e.Item || '-';
            const costNum = e.cost != null ? Number(e.cost) : 0;
            const costHtml = typeof TetraUtils !== 'undefined' ? TetraUtils.formatDualCurrencyHtml(costNum, window.TetraExchangeRate || TetraUtils.DEFAULT_RATE, { inline: true }) : costNum.toLocaleString('ko-KR');
            return '<tr><td>' + date + '</td><td>' + cat + '</td><td>' + item + '</td><td class="text-end amount-cell">' + costHtml + '</td></tr>';
          }).join('');
        } catch (e) {
          tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-3">불러올 수 없습니다.</td></tr>';
        }
      }

      document.getElementById('expense-form').addEventListener('submit', function (e) {
        const sel = document.getElementById('staffSelect');
        const opt = sel.options[sel.selectedIndex];
        document.getElementById('staffIdInput').value = sel.value || '';
        document.getElementById('staffNameInput').value = opt?.dataset?.name || '';
        if (!sel.value) {
          e.preventDefault();
          Swal.fire({ icon: 'warning', title: '직원 선택 필요', text: '지출 발생 직원을 선택해 주세요.' });
        }
      });

      let formSubmitted = false;
      document.getElementById('expense-form').addEventListener('submit', () => { formSubmitted = true; });
      document.getElementById('hidden_iframe').addEventListener('load', function () {
        if (formSubmitted) {
          formSubmitted = false;
          document.getElementById('expense-form').reset();
          document.getElementById('expenseDate').value = new Date().toISOString().slice(0, 10);
          loadStaffList();
          loadMyExpenses();
          Swal.fire({ icon: 'success', title: '등록 완료', text: '지출이 등록되었습니다.', timer: 2000, showConfirmButton: false });
        }
      });

      if (typeof TetraUtils !== 'undefined' && TetraUtils.fetchLatestExchangeRate) TetraUtils.fetchLatestExchangeRate(API_URL).catch(function(){});
      loadStaffList();
      loadMyExpenses();
    </script>
  </body>
</html>
