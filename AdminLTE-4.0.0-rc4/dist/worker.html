<!doctype html>
<html lang="en">
  <!--begin::Head-->
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Tetra Portal | Worker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#10B981" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)" />
    <link rel="preload" href="./css/adminlte.css" as="style" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@fontsource/source-sans-3@5.0.12/index.css"
      integrity="sha256-tXJfXfp6Ewt1ilPzLDtQnJV4hclT9XuaZUKyUvmyr+Q="
      crossorigin="anonymous"
      media="print"
      onload="this.media='all'"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/overlayscrollbars@2.11.0/styles/overlayscrollbars.min.css"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
      crossorigin="anonymous"
    />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="./css/adminlte.css" />
    <link rel="stylesheet" href="./css/typography-ko.css" />
    <link rel="stylesheet" href="./css/tetra-brand.css" />
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" crossorigin="anonymous"></script>
    <style>
      /* Worker UI */
      .worker-compact .btn-clock { min-height: 4.5rem; min-width: 10rem; font-size: 1.15rem; font-weight: 600; border-radius: 0.5rem; }
      @media (min-width: 768px) { .worker-compact .btn-clock { min-height: 5rem; min-width: 11rem; font-size: 1.25rem; } }
      /* Admin return FAB */
      .admin-return-fab {
        position: fixed; bottom: 1rem; right: 1rem; z-index: 1050;
        width: 2.25rem; height: 2.25rem; padding: 0; border: none; border-radius: 0.375rem;
        background: transparent; color: #64748b;
        display: flex; align-items: center; justify-content: center; text-decoration: none;
        transition: color 0.2s;
      }
      .admin-return-fab:hover { color: #334155; }
      .admin-return-fab i { font-size: 1rem; }
    </style>
  </head>
  <!--end::Head-->
  <!--begin::Body-->
  <body class="layout-fixed sidebar-expand-lg sidebar-open bg-body-tertiary">
    <!--begin::App Wrapper-->
    <div class="app-wrapper worker-compact">
      <!--begin::Header-->
      <nav class="app-header navbar navbar-expand bg-body">
        <div class="container-fluid">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link" data-lte-toggle="sidebar" href="#" role="button">
                <i class="bi bi-list"></i>
              </a>
            </li>
            <li class="nav-item d-none d-md-block"><a href="./worker.html" class="nav-link">Worker Portal</a></li>
          </ul>
          <ul class="navbar-nav ms-auto align-items-center gap-2">
            <li class="nav-item">
              <span class="nav-link text-dark d-none d-sm-inline" id="header-role-label">-</span>
            </li>
            <li class="nav-item">
              <button type="button" class="btn btn-outline-danger btn-sm" id="logout-btn">Logout</button>
            </li>
          </ul>
        </div>
      </nav>
      <!--end::Header-->
      <!--begin::Sidebar-->
      <aside class="app-sidebar bg-body-secondary shadow" data-bs-theme="dark" id="tetra-sidebar-aside">
        <div id="tetra-sidebar-inject"></div>
      </aside>
      <!--end::Sidebar-->
      <!--begin::App Main-->
      <main class="app-main">
        <div class="app-content-header">
          <div class="container-fluid">
            <div class="row">
              <div class="col-sm-6"><h3 class="mb-0">Worker Portal</h3></div>
              <div class="col-sm-6">
                <ol class="breadcrumb float-sm-end">
                  <li class="breadcrumb-item"><a href="./index.html">Home</a></li>
                  <li class="breadcrumb-item active" aria-current="page">Worker Portal</li>
                </ol>
              </div>
            </div>
          </div>
        </div>
        <div class="app-content">
          <div class="container-fluid">
            <div class="row g-4">
              <!-- Attendance Section -->
              <div class="col-12">
                <div class="card card-primary card-outline">
                  <div class="card-header">
                    <h3 class="card-title">Attendance</h3>
                  </div>
                  <div class="card-body">
                    <div class="mb-4">
                      <label for="shift" class="form-label fw-semibold">Shift</label>
                      <select class="form-select form-select-lg" id="shift" required>
                        <option value="">Select Shift</option>
                        <option value="Day">Day</option>
                        <option value="Night">Night</option>
                      </select>
                    </div>
                    <div class="d-flex flex-column flex-sm-row gap-3">
                      <button type="button" id="clockInBtn" class="btn btn-success btn-clock w-100 flex-fill" disabled>
                        <i class="bi bi-clock-fill me-2"></i>Clock In
                      </button>
                      <button type="button" id="clockOutBtn" class="btn btn-danger btn-clock w-100 flex-fill" disabled>
                        <i class="bi bi-clock-history me-2"></i>Clock Out
                      </button>
                    </div>
                  </div>
                </div>
              </div>

              <!-- Daily Tasks Section -->
              <div class="col-12">
                <div class="card card-info card-outline">
                  <div class="card-header">
                    <h3 class="card-title">Daily Tasks</h3>
                  </div>
                  <div class="card-body">
                    <p class="text-muted small mb-3">Select today&apos;s completed game-related tasks (multiple allowed).</p>
                    <form id="daily-tasks-form">
                      <div class="mb-3">
                        <div class="form-check">
                          <input class="form-check-input" type="checkbox" id="task-levelup" value="Level Up" />
                          <label class="form-check-label" for="task-levelup">Level Up</label>
                          <div class="mt-1 ms-4" id="task-levelup-detail" style="display:none;">
                            <input type="text" class="form-control form-control-sm d-inline-block" id="task-levelup-level" placeholder="Level? (e.g. 60)" maxlength="10" style="width: 120px;" />
                          </div>
                        </div>
                        <div class="form-check mt-2">
                          <input class="form-check-input" type="checkbox" id="task-dungeon" value="Dungeon" />
                          <label class="form-check-label" for="task-dungeon">Dungeon</label>
                        </div>
                        <div class="form-check mt-2">
                          <input class="form-check-input" type="checkbox" id="task-quest" value="Quest" />
                          <label class="form-check-label" for="task-quest">Quest</label>
                        </div>
                        <div class="form-check mt-2">
                          <input class="form-check-input" type="checkbox" id="task-farming" value="Farming Support" />
                          <label class="form-check-label" for="task-farming">Farming Support</label>
                        </div>
                        <div class="form-check mt-2">
                          <input class="form-check-input" type="checkbox" id="task-pvp" value="PvP" />
                          <label class="form-check-label" for="task-pvp">PvP</label>
                        </div>
                        <div class="form-check mt-2">
                          <input class="form-check-input" type="checkbox" id="task-etc" value="Other" />
                          <label class="form-check-label" for="task-etc">Other</label>
                        </div>
                      </div>
                      <button type="submit" class="btn btn-info btn-lg">
                        <i class="bi bi-check2-square me-2"></i>Register Daily Tasks
                      </button>
                    </form>
                  </div>
                </div>
              </div>

              <!-- Daily Farming Section -->
              <div class="col-12">
                <div class="card card-success card-outline">
                  <div class="card-header">
                    <h3 class="card-title">Daily Farming</h3>
                  </div>
                  <div class="card-body">
                    <p class="text-muted small mb-3">Today&apos;s total: <strong id="farming-today-total">0</strong> <span class="ms-2">잔여량: <strong id="farming-balance">0</strong></span></p>
                    <form id="farmingForm">
                      <div class="row g-3">
                        <div class="col-md-6">
                          <label for="game" class="form-label">Game</label>
                          <select class="form-select form-select-lg" name="game" id="game" required>
                            <option value="">Select Game</option>
                            <option value="Aion 2">Aion 2</option>
                            <option value="Lineage Classic">Lineage Classic</option>
                          </select>
                        </div>
                        <div class="col-md-6">
                          <label for="amount" class="form-label">Amount</label>
                          <input
                            type="number"
                            class="form-control form-control-lg"
                            name="amount"
                            id="amount"
                            placeholder="0"
                            min="0"
                            step="1"
                            required
                          />
                        </div>
                        <div class="col-12">
                          <button type="submit" class="btn btn-success btn-lg py-3 px-4">
                            <i class="bi bi-check-circle me-2"></i>Submit Farming
                          </button>
                        </div>
                      </div>
                    </form>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
      <!--end::App Main-->
      <!--begin::Footer-->
      <footer class="app-footer">
        <div class="float-end d-none d-sm-inline">Worker Portal</div>
        <strong>
          Copyright &copy; 2014-2025&nbsp;
          <a href="https://adminlte.io" class="text-decoration-none">AdminLTE.io</a>.
        </strong>
        All rights reserved.
      </footer>
      <!--end::Footer-->
    </div>
    <!--end::App Wrapper-->

    <!-- Pinned Notice Modal -->
    <div class="modal fade" id="pinnedNoticeModal" tabindex="-1" aria-labelledby="pinnedNoticeModalLabel" aria-hidden="true" data-bs-backdrop="static">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="pinnedNoticeModalLabel">Important Notice</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body" id="pinnedNoticeModalBody" style="font-size:15px;line-height:1.6;letter-spacing:-0.01em;"></div>
          <div class="modal-footer">
            <a href="./notices.html" class="btn btn-primary">View Notices</a>
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Close</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Admin return FAB -->
    <a href="#" id="admin-return-fab" class="admin-return-fab d-none" title="Back to Admin" aria-label="Back to Admin">
      <i class="bi bi-arrow-left-square"></i>
    </a>

    <!-- Hidden iframe for CORS-free form submission -->
    <iframe name="hidden_iframe" id="hidden_iframe" style="display: none;"></iframe>

    <!--begin::Script-->
    <script
      src="https://cdn.jsdelivr.net/npm/overlayscrollbars@2.11.0/browser/overlayscrollbars.browser.es6.min.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.min.js"
      crossorigin="anonymous"
    ></script>
    <script src="./js/routes.js"></script>
    <script src="./js/adminlte.js"></script>
    <script src="./js/sidebar-master.js"></script>
    <script src="./js/sidebar-static.js"></script>
    <script src="./js/header-role.js"></script>
    <script>
      // Auth Guard bypass (uncomment to restore)
      // (function () {
      //   const userName = localStorage.getItem('userName');
      //   if (!userName) { location.href = './login.html'; return; }
      // })();

      const SELECTOR_SIDEBAR_WRAPPER = '.sidebar-wrapper';
      const Default = {
        scrollbarTheme: 'os-theme-light',
        scrollbarAutoHide: 'leave',
        scrollbarClickScroll: true,
      };
      document.addEventListener('DOMContentLoaded', function () {
        const sidebarWrapper = document.querySelector(SELECTOR_SIDEBAR_WRAPPER);
        if (sidebarWrapper && OverlayScrollbarsGlobal?.OverlayScrollbars !== undefined) {
          OverlayScrollbarsGlobal.OverlayScrollbars(sidebarWrapper, {
            scrollbars: {
              theme: Default.scrollbarTheme,
              autoHide: Default.scrollbarAutoHide,
              clickScroll: Default.scrollbarClickScroll,
            },
          });
        }

        // Hello, [userName]
        const userName = localStorage.getItem('userName');
        if (userName) {
          document.getElementById('user-greeting').textContent = 'Hello, ' + userName;
        }

        // Notices New badge
        var apiUrl = 'https://script.google.com/macros/s/AKfycbzFf_YuMxN3hkpPW6sFRKoblztRRf9yfrUMo6BJZ-WeFzYUNQHq4FybW3R_LnzwP9IxxA/exec';
        var badgeEl = document.getElementById('nav-notices-badge');
        if (badgeEl) {
          fetch(apiUrl + '?action=getNoticeList&offset=0&limit=50').then(function (r) { return r.json(); })
            .then(function (data) {
              var notices = data.notices || [];
              var readRaw = localStorage.getItem('tetra_notices_read_ids');
              var readIds = readRaw ? JSON.parse(readRaw) : [];
              var hasUnread = notices.some(function (n) { return readIds.indexOf(n.notice_id) < 0; });
              badgeEl.classList.toggle('d-none', !hasUnread);
            }).catch(function () {});
        }

        // Pinned notice modal
        fetch(apiUrl + '?action=getNoticeList&offset=0&limit=20').then(function (r) { return r.json(); })
          .then(function (data) {
            var notices = data.notices || [];
            var pinned = notices.filter(function (n) { return n.is_pinned; });
            var latest = pinned[0];
            if (!latest) return;
            var shownKey = 'tetra_pinned_notice_shown_' + latest.notice_id;
            if (sessionStorage.getItem(shownKey)) return;
            var titleEl = document.getElementById('pinnedNoticeModalLabel');
            var bodyEl = document.getElementById('pinnedNoticeModalBody');
            if (titleEl) titleEl.textContent = latest.title || 'Important Notice';
            if (bodyEl) {
              bodyEl.innerHTML = (typeof DOMPurify !== 'undefined' ? DOMPurify.sanitize(latest.content || '', { ALLOWED_TAGS: ['p','br','strong','em','u','a','ul','ol','li','h1','h2','h3','h4','blockquote'] }) : (latest.content || '').replace(/</g, '&lt;').replace(/>/g, '&gt;'));
              var meta = document.createElement('p');
              meta.className = 'text-muted small mt-3 mb-0';
              meta.textContent = (latest.author_name || '') + ' · ' + (latest.created_at || '');
              bodyEl.appendChild(meta);
            }
            sessionStorage.setItem(shownKey, '1');
            var modalEl = document.getElementById('pinnedNoticeModal');
            if (modalEl) { var m = new bootstrap.Modal(modalEl); m.show(); }
          }).catch(function () {});

        // Admin/Manager return FAB
        const role = localStorage.getItem('role');
        const returnFab = document.getElementById('admin-return-fab');
        if (returnFab && (role === 'Admin' || role === 'Manager')) {
          returnFab.href = role === 'Admin' ? './admin.html' : './manager.html';
          returnFab.classList.remove('d-none');
        }
      });

      // Logout
      document.getElementById('logout-btn').addEventListener('click', function () {
        localStorage.removeItem('userName');
        localStorage.removeItem('role');
        location.href = './login.html';
      });

      var API_URL = 'https://script.google.com/macros/s/AKfycbzFf_YuMxN3hkpPW6sFRKoblztRRf9yfrUMo6BJZ-WeFzYUNQHq4FybW3R_LnzwP9IxxA/exec';

      var todaySummary = { farmingTotal: 0, farmingCount: 0, hasDailyTasks: false };

      function setClockButtons(allDone, canIn, canOut) {
        var btnIn = document.getElementById('clockInBtn');
        var btnOut = document.getElementById('clockOutBtn');
        btnIn.disabled = !canIn || allDone;
        btnOut.disabled = !canOut || allDone;
      }

      async function loadWorkerBalance() {
        var myName = (localStorage.getItem('userName') || '').trim();
        if (!myName) return;
        try {
          var res = await fetch(API_URL + '?action=getWorkerBalance&workerName=' + encodeURIComponent(myName));
          var data = await res.json();
          var el = document.getElementById('farming-balance');
          if (el) el.textContent = data.balance != null ? data.balance : '0';
        } catch (e) {}
      }

      async function loadWorkerTodaySummary() {
        var myName = (localStorage.getItem('userName') || '').trim();
        if (!myName) return todaySummary;
        try {
          var today = new Date().toISOString().slice(0, 10);
          var [sumRes, balRes] = await Promise.all([
            fetch(API_URL + '?action=getWorkerTodaySummary&workerName=' + encodeURIComponent(myName) + '&date=' + encodeURIComponent(today)),
            fetch(API_URL + '?action=getWorkerBalance&workerName=' + encodeURIComponent(myName))
          ]);
          var data = await sumRes.json();
          todaySummary = { farmingTotal: data.farmingTotal || 0, farmingCount: data.farmingCount || 0, hasDailyTasks: !!data.hasDailyTasks };
          var el = document.getElementById('farming-today-total');
          if (el) el.textContent = todaySummary.farmingTotal;
          var balData = await balRes.json();
          var balEl = document.getElementById('farming-balance');
          if (balEl) balEl.textContent = balData.balance != null ? balData.balance : '0';
        } catch (e) {}
        return todaySummary;
      }

      async function loadAttendanceState() {
        var userName = (localStorage.getItem('userName') || '').trim();
        if (!userName) { setClockButtons(false, false, false); return; }
        try {
          var today = new Date().toISOString().slice(0, 10);
          var [attRes, sumRes, balRes] = await Promise.all([
            fetch(API_URL + '?action=getDailyAttendance&date=' + encodeURIComponent(today)),
            fetch(API_URL + '?action=getWorkerTodaySummary&workerName=' + encodeURIComponent(userName) + '&date=' + encodeURIComponent(today)),
            fetch(API_URL + '?action=getWorkerBalance&workerName=' + encodeURIComponent(userName))
          ]);
          var data = await attRes.json();
          var sumData = await sumRes.json();
          var balData = await balRes.json();
          todaySummary = { farmingTotal: sumData.farmingTotal || 0, farmingCount: sumData.farmingCount || 0, hasDailyTasks: !!sumData.hasDailyTasks };
          var el = document.getElementById('farming-today-total');
          if (el) el.textContent = todaySummary.farmingTotal;
          var balEl = document.getElementById('farming-balance');
          if (balEl) balEl.textContent = balData.balance != null ? balData.balance : '0';
          var list = data.attendance || data.data || data.rows || (Array.isArray(data) ? data : []);
          var me = (Array.isArray(list) ? list : []).find(function (r) {
            return (r.name || r.Name || r.workerName || '').toString().trim() === userName;
          });
          if (!me) { setClockButtons(false, true, false); return; }
          var out = (me.out || me.Out || me.clockOut || '').toString().trim();
          if (!out || out === '-') {
            var canOut = todaySummary.hasDailyTasks && todaySummary.farmingCount > 0;
            setClockButtons(false, false, canOut);
            return;
          }
          setClockButtons(true, false, false);
        } catch (e) { setClockButtons(false, true, false); }
      }

      function doClock(type) {
        var userName = localStorage.getItem('userName') || '';
        var shift = document.getElementById('shift').value;
        if (!userName && type === 'clock_in') { alert('Please log in.'); return; }
        if (!shift && type === 'clock_in') { alert('Please select a shift.'); return; }
        var btnIn = document.getElementById('clockInBtn');
        var btnOut = document.getElementById('clockOutBtn');
        btnIn.disabled = true;
        btnOut.disabled = true;
        var fd = new FormData();
        fd.append('action', 'clock_in_out');
        fd.append('clockType', type);
        fd.append('workerName', userName);
        fd.append('shift', shift || 'Day');
        fetch(API_URL, { method: 'POST', body: fd })
          .then(function (r) { return r.json().catch(function () { return {}; }); })
          .then(function (data) {
            if (data.result === 'error') {
              alert(data.message || 'Failed');
              loadAttendanceState();
              return;
            }
            loadAttendanceState();
          })
          .catch(function () {
            alert('Network error. Please try again.');
            loadAttendanceState();
          });
      }

      document.getElementById('clockInBtn').addEventListener('click', function () { doClock('clock_in'); });
      document.getElementById('clockOutBtn').addEventListener('click', function () { doClock('clock_out'); });
      document.getElementById('task-levelup').addEventListener('change', function () {
        document.getElementById('task-levelup-detail').style.display = this.checked ? 'block' : 'none';
      });
      document.getElementById('daily-tasks-form').addEventListener('submit', function (e) {
        e.preventDefault();
        var tasks = [];
        ['task-levelup', 'task-dungeon', 'task-quest', 'task-farming', 'task-pvp', 'task-etc'].forEach(function (id) {
          var cb = document.getElementById(id);
          if (cb && cb.checked) {
            var typ = cb.value || '';
            var detail = (typ === 'Level Up') ? ((document.getElementById('task-levelup-level') || {}).value || '') : '';
            tasks.push({ type: typ, detail: detail });
          }
        });
        if (!tasks.length) { alert('Select at least one task.'); return; }
        function doSubmit() {
          var fd = new FormData();
          fd.append('action', 'logDailyTasks');
          fd.append('workerName', localStorage.getItem('userName') || '');
          fd.append('tasks', JSON.stringify(tasks));
          fetch(API_URL, { method: 'POST', body: fd })
            .then(function (r) { return r.json().catch(function () { return {}; }); })
            .then(function (data) {
              if (data.result === 'error') { alert(data.message || 'Failed'); return; }
              (typeof Swal !== 'undefined' ? Swal : { fire: function(x){alert(x.title);} }).fire({ icon: 'success', title: 'Daily tasks registered.', toast: true, position: 'top-end', showConfirmButton: false, timer: 2000 });
              document.querySelectorAll('#daily-tasks-form input[type="checkbox"]').forEach(function (c) { c.checked = false; });
              document.getElementById('task-levelup-detail').style.display = 'none';
              document.getElementById('task-levelup-level').value = '';
              loadAttendanceState();
            })
            .catch(function () { alert('Network error.'); });
        }
        doSubmit();
      });
      document.addEventListener('DOMContentLoaded', loadAttendanceState);

      document.getElementById('farmingForm').addEventListener('submit', function (e) {
        e.preventDefault();
        var game = document.getElementById('game').value;
        var amountRaw = document.getElementById('amount').value;
        var amount = parseInt(amountRaw, 10) || 0;
        var workerName = localStorage.getItem('userName') || '';
        if (!game || amount < 0) return;
        var currentTotal = todaySummary.farmingTotal || 0;
        var newTotal = currentTotal + amount;
        var doSubmit = function () {
          var body = 'action=farming&workerName=' + encodeURIComponent(workerName) + '&game=' + encodeURIComponent(game) + '&amount=' + encodeURIComponent(String(amount));
          fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: body })
            .then(function (r) { return r.json().catch(function () { return {}; }); })
            .then(function (data) {
              if (data.result === 'error') {
                (typeof Swal !== 'undefined' ? Swal.fire : function(x){alert(x.title);})({ icon: 'error', title: data.message || '등록 실패' });
                return;
              }
              document.getElementById('amount').value = '';
              loadWorkerTodaySummary().then(function (s) {
                loadAttendanceState();
                loadWorkerBalance();
                (typeof Swal !== 'undefined' ? Swal.fire : function(x){alert(x.title);})({ icon: 'success', title: 'Registered (Total ' + s.farmingTotal + ')', toast: true, position: 'top-end', showConfirmButton: false, timer: 2000 });
              });
            })
            .catch(function () {
              (typeof Swal !== 'undefined' ? Swal.fire : function(x){alert(x.title);})({ icon: 'error', title: 'Registration failed' });
            });
        };
        if (typeof Swal !== 'undefined') {
          Swal.fire({
          icon: 'question',
          title: 'Confirm Farming Registration',
            html: 'Current total: <strong>' + currentTotal + '</strong><br>Amount to add: <strong>' + amount + '</strong><br>Total after registration: <strong>' + newTotal + '</strong><br><br>Do you want to register?',
            showCancelButton: true,
            confirmButtonText: 'Register',
            cancelButtonText: 'Cancel'
          }).then(function (result) {
            if (result.isConfirmed) doSubmit();
          });
        } else if (confirm('Current total: ' + currentTotal + ', Amount to add: ' + amount + '. Total after registration: ' + newTotal + '. Do you want to register?')) {
          doSubmit();
        }
      });
    </script>
    <!--end::Script-->
  </body>
  <!--end::Body-->
</html>
