    <script>
      (function () {
        const role = localStorage.getItem('role');
        if (!role || (role !== 'Manager' && role !== 'Admin')) {
          Swal.fire({ icon: 'error', title: '접근 거부', text: '관리자 권한이 필요합니다.' }).then(() => { location.href = './login.html'; });
          return;
        }
        if (role === 'Manager') {
          if (typeof Swal !== 'undefined') Swal.fire({ icon: 'info', title: '지출 등록으로 이동', text: '매니저는 지출 등록 페이지를 이용해 주세요.', toast: true, position: 'top-end', showConfirmButton: false, timer: 2500, timerProgressBar: true });
          else alert('접근 권한이 없습니다.');
          location.replace('./expense_registration.html');
          return;
        }
      })();
    </script>
    <script>
      const SELECTOR_SIDEBAR_WRAPPER = '.sidebar-wrapper';
      const Default = { scrollbarTheme: 'os-theme-light', scrollbarAutoHide: 'leave', scrollbarClickScroll: true };
      document.addEventListener('DOMContentLoaded', function () {
        const sw = document.querySelector(SELECTOR_SIDEBAR_WRAPPER);
        if (sw && OverlayScrollbarsGlobal?.OverlayScrollbars) {
          OverlayScrollbarsGlobal.OverlayScrollbars(sw, { scrollbars: { theme: Default.scrollbarTheme, autoHide: Default.scrollbarAutoHide, clickScroll: Default.scrollbarClickScroll } });
        }
        const userName = localStorage.getItem('userName');
        // 우측 상단 역할/이름은 header-role.js에서 표시
      });

      document.getElementById('logout-btn').addEventListener('click', function () {
        localStorage.removeItem('userName');
        localStorage.removeItem('role');
        location.href = './login.html';
      });

      const API_URL = 'https://script.google.com/macros/s/AKfycbzFf_YuMxN3hkpPW6sFRKoblztRRf9yfrUMo6BJZ-WeFzYUNQHq4FybW3R_LnzwP9IxxA/exec';
      const CATEGORIES = ['Food', 'Supplies', 'Rent', 'Electricity', 'Internet', 'Others'];
      const CATEGORY_COLORS = ['#0d6efd', '#20c997', '#ffc107', '#d63384', '#6f42c1', '#adb5bd'];
      let staffList = [];
      let staffChart = null;

      function escapeHtml(s) {
        const d = document.createElement('div');
        d.textContent = String(s ?? '');
        return d.innerHTML;
      }
      function escapeAttr(s) {
        return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;');
      }
      function getVal(obj, ...keys) {
        if (obj == null) return '';
        for (const k of keys) {
          const v = obj[k];
          if (v !== undefined && v !== null && v !== '') return v;
        }
        return '';
      }
      function formatNum(n) {
        if (n == null || n === '' || isNaN(n)) return '0';
        return Number(n).toLocaleString('en-US');
      }

      let expenseList = [];
      let pieChart = null;

      function populateStaffFilter() {
        const filterSel = document.getElementById('expense-staff-filter');
        if (!filterSel) return;
        const seen = {};
        const options = [{ id: '', name: '전체' }];
        staffList.forEach((u) => {
          const id = (u.userId || u.user_id || u.id || '').toString().trim();
          if (id && !seen[id]) {
            seen[id] = true;
            options.push({ id, name: u.name || u.userName || u.user_name || id });
          }
        });
        expenseList.forEach((e) => {
          const id = (getVal(e, 'staff_id', 'staffId') || '').toString().trim();
          const name = getVal(e, 'staff_name', 'staffName') || id;
          if (id && !seen[id]) {
            seen[id] = true;
            options.push({ id, name: name || id });
          }
        });
        filterSel.innerHTML = options.map((o) => `<option value="${escapeAttr(o.id)}">${escapeHtml(o.name)}</option>`).join('');
      }

      function sortStaffByRoleThenName(arr) {
        const roleOrder = { Admin: 0, Manager: 1, Worker: 2 };
        return [...arr].sort((a, b) => {
          const ra = roleOrder[(a.role || '').toString().trim()] ?? 3;
          const rb = roleOrder[(b.role || '').toString().trim()] ?? 3;
          if (ra !== rb) return ra - rb;
          const na = (a.name || a.userName || a.user_name || a.userId || '').toString().trim();
          const nb = (b.name || b.userName || b.user_name || b.userId || '').toString().trim();
          return (na || '').localeCompare(nb || '', 'ko');
        });
      }

      async function loadStaffList() {
        try {
          const res = await fetch(API_URL + '?action=getApprovedUsers');
          const data = await res.json();
          const users = data.users || data.data || [];
          let list = Array.isArray(users) ? users : [];
          const curUserId = localStorage.getItem('userId') || '';
          const curName = localStorage.getItem('userName') || '';
          const inList = list.some((u) => (u.userId || u.user_id || '').toString().trim() === curUserId);
          if (!inList && curUserId && (localStorage.getItem('role') === 'Admin' || localStorage.getItem('role') === 'Manager')) {
            list = [{ userId: curUserId, name: curName || curUserId }, ...list];
          }
          staffList = sortStaffByRoleThenName(list);
          const sel = document.getElementById('staffSelect');
          sel.innerHTML = '<option value="">선택</option>' + staffList.map((u) => {
            const id = u.userId || u.user_id || u.id || '';
            const name = u.name || u.userName || u.user_name || id;
            return `<option value="${escapeAttr(id)}" data-name="${escapeAttr(name)}">${escapeHtml(name)} (${escapeHtml(id)})</option>`;
          }).join('');
          populateStaffFilter();
          sel.onchange = function () {
            const opt = this.options[this.selectedIndex];
            document.getElementById('staffIdInput').value = this.value || '';
            document.getElementById('staffNameInput').value = opt?.dataset?.name || '';
          };
          if (localStorage.getItem('role') === 'Admin' || localStorage.getItem('role') === 'Manager') {
            const idx = staffList.findIndex((u) => (u.userId || u.user_id || '').toString().trim() === curUserId);
            if (idx >= 0) {
              sel.selectedIndex = idx + 1;
              sel.dispatchEvent(new Event('change'));
            }
          }
        } catch (e) {
          console.error('loadStaffList failed:', e);
        }
      }

      let expenseSort = { key: 'date', order: 'desc' };
      function getFilteredExpenses() {
        const staffVal = document.getElementById('expense-staff-filter')?.value || '';
        const catVal = document.getElementById('expense-category-filter')?.value || '';
        const startVal = document.getElementById('expense-date-start')?.value || '';
        const endVal = document.getElementById('expense-date-end')?.value || '';
        return expenseList.filter((e) => {
          if (staffVal) {
            const sid = getVal(e, 'staff_id', 'staffId');
            if (!sid || sid.toString().trim() !== staffVal) return false;
          }
          if (catVal) {
            const cat = getVal(e, 'category', 'Category') || '';
            if (cat !== catVal) return false;
          }
          if (startVal || endVal) {
            const d = getVal(e, 'date', 'Date') || '';
            if (startVal && d < startVal) return false;
            if (endVal && d > endVal) return false;
          }
          return true;
        });
      }
      function getSortedExpenses(list) {
        const arr = [...list];
        const k = expenseSort.key;
        const asc = expenseSort.order === 'asc';
        arr.sort((a, b) => {
          let va, vb;
          if (k === 'date') {
            va = getVal(a, 'date', 'Date') || '';
            vb = getVal(b, 'date', 'Date') || '';
            return asc ? (va > vb ? 1 : va < vb ? -1 : 0) : (va < vb ? 1 : va > vb ? -1 : 0);
          }
          if (k === 'cost') {
            va = parseFloat(getVal(a, 'cost', 'Cost')) || 0;
            vb = parseFloat(getVal(b, 'cost', 'Cost')) || 0;
            return asc ? va - vb : vb - va;
          }
          return 0;
        });
        return arr;
      }

      function getCurrentMonthRange() {
        const now = new Date();
        const y = now.getFullYear();
        const m = String(now.getMonth() + 1).padStart(2, '0');
        return { start: y + '-' + m + '-01', end: y + '-' + m + '-' + String(new Date(y, now.getMonth() + 1, 0).getDate()).padStart(2, '0') };
      }

      function updateTotalExpense() {
        const { start, end } = getCurrentMonthRange();
        const total = expenseList
          .filter((e) => {
            const d = getVal(e, 'date', 'Date');
            return d >= start && d <= end;
          })
          .reduce((sum, e) => sum + (parseFloat(getVal(e, 'cost', 'Cost')) || 0), 0);
        var totEl = document.getElementById('display-totalExpense');
        totEl.setAttribute('data-amount-php', total);
        totEl.textContent = typeof TetraCurrency !== 'undefined' ? TetraCurrency.formatForDisplay(total) : formatNum(total);
        totEl.classList.add('currency-amount');
      }

      function updatePieChart() {
        const filtered = getFilteredExpenses();
        const byCat = {};
        const role = localStorage.getItem('role');
        const SENSITIVE_CATS = ['AdminWithdrawal', 'Admin'];
        filtered.forEach((e) => {
          let cat = getVal(e, 'category', 'Category') || 'Others';
          if (role === 'Manager' && SENSITIVE_CATS.includes(cat)) cat = '비공개 항목';
          if (!byCat[cat]) byCat[cat] = 0;
          byCat[cat] += parseFloat(getVal(e, 'cost', 'Cost')) || 0;
        });
        const labels = Object.keys(byCat).filter((k) => byCat[k] > 0);
        const series = labels.map((k) => byCat[k]);
        const colors = labels.map((_, i) => CATEGORY_COLORS[i % CATEGORY_COLORS.length]);
        if (series.length === 0) {
          series.push(1);
          labels.push('데이터 없음');
          colors.push('#adb5bd');
        }
        const opt = {
          series,
          chart: { type: 'pie', height: 280 },
          labels,
          colors,
          dataLabels: { enabled: true },
          legend: { position: 'bottom' },
        };
        if (pieChart) pieChart.updateOptions(opt); else pieChart = new ApexCharts(document.querySelector('#expense-pie-chart'), opt);
        pieChart.render();
      }

      function updateStaffChart() {
        const filtered = getFilteredExpenses();
        const byStaff = {};
        const role = localStorage.getItem('role');
        const SENSITIVE_CATS = ['AdminWithdrawal', 'Admin'];
        filtered.forEach((e) => {
          let cat = getVal(e, 'category', 'Category') || '';
          if (role === 'Manager' && SENSITIVE_CATS.includes(cat)) return;
          const name = getVal(e, 'staff_name', 'staffName') || getVal(e, 'staff_id', 'staffId') || '미지정';
          if (!byStaff[name]) byStaff[name] = 0;
          byStaff[name] += parseFloat(getVal(e, 'cost', 'Cost')) || 0;
        });
        const labels = Object.keys(byStaff).filter((k) => byStaff[k] > 0);
        const series = labels.map((k) => byStaff[k]);
        const barColors = ['#10B981', '#0d6efd', '#fd7e14', '#6f42c1', '#20c997', '#ffc107'];
        const opt = {
          series: [{ name: '지출액', data: series }],
          chart: { type: 'bar', height: 240 },
          plotOptions: { bar: { horizontal: true, borderRadius: 4 } },
          dataLabels: { enabled: true },
          xaxis: { categories: labels },
          colors: barColors,
        };
        const el = document.querySelector('#expense-staff-chart');
        if (!el) return;
        if (staffChart) staffChart.updateOptions(opt); else staffChart = new ApexCharts(el, opt);
        staffChart.render();
      }

      function initExpenseSortUI() {
        const dateTh = document.querySelector('.th-sortable[data-sort="date"]');
        if (dateTh) { dateTh.classList.add('active'); const arr = dateTh.querySelector('.sort-arrow'); if (arr) arr.textContent = '▼'; }
      }
      function renderExpenseTable() {
        const tbody = document.getElementById('expense-tbody');
        const filtered = getFilteredExpenses();
        const sorted = getSortedExpenses(filtered);
        const role = localStorage.getItem('role');
        const SENSITIVE_CATS = ['AdminWithdrawal', 'Admin'];
        const isSensitive = (c) => SENSITIVE_CATS.includes(String(c || '').trim());
        const maskForManager = (val, cat) => (role === 'Manager' && isSensitive(cat) ? '비공개 항목' : (val || '-'));
        if (sorted.length === 0) {
          tbody.innerHTML = '<tr><td colspan="7"><div class="zero-state"><i class="bi bi-inbox fs-1 d-block mb-2 opacity-50"></i>조건에 맞는 데이터가 없습니다.</div></td></tr>';
          return;
        }
        tbody.innerHTML = sorted
          .map((r) => {
            const id = getVal(r, 'id', 'expenseId', 'ID');
            const date = getVal(r, 'date', 'Date');
            const cat = getVal(r, 'category', 'Category');
            const staffId = getVal(r, 'staff_id', 'staffId');
            const staffName = getVal(r, 'staff_name', 'staffName') || staffId || '-';
            const item = getVal(r, 'item', 'Item');
            const cost = getVal(r, 'cost', 'Cost');
            const remarks = getVal(r, 'remarks', 'Remarks');
            const rowData = JSON.stringify({ id, date, category: cat, staff_id: staffId, staff_name: staffName, item, cost, remarks });
            const dispCat = maskForManager(cat, cat);
            const dispItem = maskForManager(item, cat);
            const dispRemarks = maskForManager(remarks, cat);
            const sensitive = role === 'Manager' && isSensitive(cat);
            const staffLink = staffId ? `<a href="./staff_management.html?targetId=${encodeURIComponent(staffId)}" class="text-decoration-none" title="직원 프로필"><span class="badge bg-light text-dark border">${escapeHtml(staffName)}</span></a>` : escapeHtml(staffName);
            const actionBtns = sensitive ? '<span class="text-muted small">—</span>' : `
              <button type="button" class="btn btn-sm btn-info edit-expense-btn me-1" data-row="${escapeAttr(rowData)}">수정</button>
              <button type="button" class="btn btn-sm btn-danger delete-expense-btn" data-id="${escapeAttr(id)}" data-item="${escapeAttr(item)}">삭제</button>`;
            return `
              <tr>
                <td>${escapeHtml(date || '-')}</td>
                <td>${escapeHtml(dispCat)}</td>
                <td>${staffLink}</td>
                <td>${escapeHtml(dispItem)}</td>
                <td class="text-end amount-cell"><span data-amount-php="${parseFloat(cost) || 0}" class="currency-amount">${typeof TetraCurrency !== 'undefined' ? TetraCurrency.formatForDisplay(parseFloat(cost) || 0) : escapeHtml(formatNum(cost))}</span></td>
                <td>${escapeHtml(dispRemarks)}</td>
                <td>${actionBtns}</td>
              </tr>
            `;
          })
          .join('');
        tbody.querySelectorAll('.edit-expense-btn').forEach((btn) => {
          btn.addEventListener('click', function () {
            const row = JSON.parse(this.dataset.row);
            document.getElementById('expenseId').value = row.id || '';
            document.getElementById('expenseDate').value = row.date || '';
            document.getElementById('category').value = row.category || '';
            document.getElementById('staffIdInput').value = row.staff_id || '';
            document.getElementById('staffNameInput').value = row.staff_name || '';
            const staffSel = document.getElementById('staffSelect');
            for (let i = 0; i < staffSel.options.length; i++) {
              if (staffSel.options[i].value === (row.staff_id || '')) {
                staffSel.selectedIndex = i;
                break;
              }
            }
            document.getElementById('item').value = row.item || '';
            document.getElementById('cost').value = row.cost || '';
            document.getElementById('remarks').value = row.remarks || '';
            document.getElementById('expense-form').scrollIntoView({ behavior: 'smooth' });
          });
        });
        tbody.querySelectorAll('.delete-expense-btn').forEach((btn) => {
          btn.addEventListener('click', function () {
            const id = this.dataset.id;
            const item = this.dataset.item || 'this item';
            Swal.fire({
              icon: 'warning',
              title: '지출 삭제',
              text: '이 항목을 삭제하시겠습니까?',
              showCancelButton: true,
              confirmButtonText: '삭제',
              cancelButtonText: '취소',
            }).then(async (r) => {
              if (r.isConfirmed) {
                try {
                  let res = await fetch(API_URL + '?action=deleteExpense&expenseId=' + encodeURIComponent(id), { method: 'GET' });
                  let data = await res.json().catch(() => ({}));
                  if (data.error) throw new Error(data.error);
                  await loadExpenseList();
                  Swal.fire({ icon: 'success', title: '삭제됨', timer: 1500, showConfirmButton: false });
                } catch (err) {
                  Swal.fire({ icon: 'error', title: '삭제 실패', text: err.message || '지출 삭제에 실패했습니다.' });
                }
              }
            });
          });
        });
      }

      async function loadExpenseList() {
        const tbody = document.getElementById('expense-tbody');
        tbody.innerHTML = '<tr><td colspan="7" class="text-center py-4"><span class="spinner-border spinner-border-sm me-2"></span>로딩 중...</td></tr>';
        try {
          const res = await fetch(API_URL + '?action=getExpenseList');
          const data = await res.json();
          const rows = data.expenses || data.expenseList || data.data || data.rows || data || [];
          expenseList = Array.isArray(rows) ? rows : [];
          renderExpenseTable();
          updateTotalExpense();
          updatePieChart();
          updateStaffChart();
          populateStaffFilter();
        } catch (err) {
          console.error('Load expense list failed:', err);
          tbody.innerHTML = '<tr><td colspan="7" class="text-center text-danger py-4">데이터를 불러오지 못했습니다.</td></tr>';
        }
      }

      document.getElementById('refresh-expense-btn')?.addEventListener('click', loadExpenseList);
      ['expense-staff-filter', 'expense-category-filter', 'expense-date-start', 'expense-date-end'].forEach((id) => {
        const el = document.getElementById(id);
        if (el) el.addEventListener('change', function () { renderExpenseTable(); updatePieChart(); updateStaffChart(); });
        if (id.startsWith('expense-date')) el.addEventListener('input', function () { renderExpenseTable(); updatePieChart(); updateStaffChart(); });
      });
      document.querySelectorAll('.th-sortable').forEach((th) => {
        th.addEventListener('click', function () {
          const key = this.dataset.sort;
          if (!key) return;
          const isActive = expenseSort.key === key;
          expenseSort = { key, order: isActive && expenseSort.order === 'desc' ? 'asc' : 'desc' };
          document.querySelectorAll('.th-sortable').forEach((t) => {
            t.classList.remove('active');
            const arr = t.querySelector('.sort-arrow');
            if (arr) arr.textContent = '';
          });
          this.classList.add('active');
          const arr = this.querySelector('.sort-arrow');
          if (arr) arr.textContent = expenseSort.order === 'desc' ? '▼' : '▲';
          renderExpenseTable();
        });
      });
      document.getElementById('expenseDate').value = new Date().toISOString().slice(0, 10);
      loadStaffList();
      if (localStorage.getItem('role') === 'Admin') { loadExpenseList(); initExpenseSortUI(); }

      let expenditureData = { estimatedPayroll: 0, expensePHP: 0, totalExpenditure: 0 };
      async function loadPLExpenditure() {
        try {
          const m = new Date().toISOString().slice(0, 7);
          const res = await fetch(API_URL + '?action=getPLDashboard&month=' + encodeURIComponent(m));
          const data = await res.json();
          const payroll = Number(data.estimatedPayroll ?? data.estimated_payroll ?? 0);
          const operating = Number(data.expensePHP ?? data.operatingExpenses ?? data.expense_php ?? 0);
          const total = payroll + operating;
          expenditureData = { estimatedPayroll: payroll, expensePHP: operating, totalExpenditure: total };
          document.getElementById('display-estimatedPayroll').setAttribute('data-amount-php', payroll);
          document.getElementById('display-estimatedPayroll').textContent = typeof TetraCurrency !== 'undefined' ? TetraCurrency.formatForDisplay(payroll) : formatNum(payroll);
          document.getElementById('display-expensePHP').setAttribute('data-amount-php', operating);
          document.getElementById('display-expensePHP').textContent = typeof TetraCurrency !== 'undefined' ? TetraCurrency.formatForDisplay(operating) : formatNum(operating);
          document.getElementById('display-totalExpenditure').setAttribute('data-amount-php', total);
          document.getElementById('display-totalExpenditure').textContent = typeof TetraCurrency !== 'undefined' ? TetraCurrency.formatForDisplay(total) : formatNum(total);
        } catch (e) {
          document.getElementById('display-estimatedPayroll').textContent = '-';
          document.getElementById('display-expensePHP').textContent = '-';
          document.getElementById('display-totalExpenditure').textContent = '-';
        }
      }
      document.getElementById('confirm-settlement-btn')?.addEventListener('click', function () {
        const total = expenditureData.totalExpenditure;
        const totalStr = typeof total === 'number' ? total.toLocaleString('ko-KR') : String(total ?? '-');
        Swal.fire({ icon: 'question', title: '정산 확정', text: '이번 달 총 지출은 ' + totalStr + ' 페소입니다. 확정하시겠습니까?', showCancelButton: true, confirmButtonText: '확정', cancelButtonText: '취소' }).then((r) => {
          if (r.isConfirmed) {
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = API_URL;
            form.target = 'hidden_iframe';
            [{ name: 'action', value: 'confirmSettlement' }, { name: 'estimatedPayroll', value: expenditureData.estimatedPayroll }, { name: 'expensePHP', value: expenditureData.expensePHP }, { name: 'totalExpenditure', value: expenditureData.totalExpenditure }].forEach((f) => {
              const inp = document.createElement('input');
              inp.type = 'hidden';
              inp.name = f.name;
              inp.value = f.value;
              form.appendChild(inp);
            });
            document.body.appendChild(form);
            form.submit();
            document.body.removeChild(form);
            Swal.fire({ icon: 'success', title: '확정 완료', text: '정산이 확정되었습니다.', timer: 2000, showConfirmButton: false });
          }
        });
      });
      if (localStorage.getItem('role') === 'Admin') {
        if (typeof TetraCurrency !== 'undefined') TetraCurrency.init(API_URL);
        else if (typeof TetraUtils !== 'undefined' && TetraUtils.fetchLatestExchangeRate) TetraUtils.fetchLatestExchangeRate(API_URL).catch(function(){});
        loadPLExpenditure();
      }

      document.getElementById('expense-form').addEventListener('submit', async function (e) {
        e.preventDefault();
        const form = e.target;
        const sel = document.getElementById('staffSelect');
        const opt = sel.options[sel.selectedIndex];
        document.getElementById('staffIdInput').value = sel.value || '';
        document.getElementById('staffNameInput').value = (opt && opt.dataset && opt.dataset.name) ? opt.dataset.name : (opt ? opt.text : '');
        if (!sel.value) {
          Swal.fire({ icon: 'warning', title: '직원 선택 필요', text: '지출 발생 직원을 선택해 주세요.' });
          return;
        }
        const submitBtn = form.querySelector('button[type="submit"]');
        const origText = submitBtn ? submitBtn.innerHTML : '';
        if (submitBtn) { submitBtn.disabled = true; submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>저장 중...'; }
        try {
          const formData = new FormData(form);
          formData.set('action', 'upsertExpense');
          const res = await fetch(API_URL, { method: 'POST', body: formData });
          const data = await res.json().catch(function () { return {}; });
          if (data.error) throw new Error(data.error);
          form.reset();
          document.getElementById('expenseId').value = '';
          document.getElementById('expenseDate').value = new Date().toISOString().slice(0, 10);
          var role = localStorage.getItem('role');
          var curUserId = localStorage.getItem('userId') || '';
          if (role === 'Admin' || role === 'Manager') {
            var staffSel = document.getElementById('staffSelect');
            var idx = staffList.findIndex(function (u) { return (u.userId || u.user_id || '').toString().trim() === curUserId; });
            if (idx >= 0 && staffSel) {
              staffSel.selectedIndex = idx + 1;
              staffSel.dispatchEvent(new Event('change'));
            }
          }
          var savedText = data.warning ? data.warning : '지출이 저장되었습니다.';
          var approvedText = data.warning ? data.warning : '지출 내역은 관리자 승인 후 리포트에 반영됩니다.';
          if (role === 'Admin') {
            loadPLExpenditure();
            Swal.fire({ icon: 'success', title: '저장됨', text: savedText, timer: data.warning ? 4000 : 2000, showConfirmButton: false });
          } else {
            Swal.fire({
              icon: 'success',
              title: '등록 완료',
              text: approvedText,
              timer: data.warning ? 4000 : 3000,
              showConfirmButton: false
            });
          }
        } catch (err) {
          Swal.fire({ icon: 'error', title: '저장 실패', text: (err && err.message) || '지출 저장에 실패했습니다.' });
        } finally {
          if (submitBtn) { submitBtn.disabled = false; submitBtn.innerHTML = origText; }
        }
      });
    </script>
  </body>
</html>
