<!doctype html>
<html lang="ko">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Tetra Portal | 일일업무</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <meta name="theme-color" content="#10B981" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/source-sans-3@5.0.12/index.css" crossorigin="anonymous" media="print" onload="this.media='all'" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/overlayscrollbars@2.11.0/styles/overlayscrollbars.min.css" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" crossorigin="anonymous" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="./css/adminlte.css" />
    <link rel="stylesheet" href="./css/typography-ko.css" />
    <link rel="stylesheet" href="./css/tetra-brand.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" crossorigin="anonymous"></script>
    <style>
      .daily-tasks-page .card { border-radius: 0.5rem; border: none; box-shadow: 0 0.125rem 0.5rem rgba(0,0,0,0.06); }
      .daily-tasks-page .filter-bar { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 0.5rem; padding: 0.75rem 1rem; margin-bottom: 1rem; }
      .daily-tasks-page .table-responsive { overflow-x: auto; }
      .daily-tasks-page .table thead th { background: #1e3a5f !important; color: #fff !important; font-weight: 600; border-color: #1e3a5f; }
    </style>
  </head>
  <body class="layout-fixed sidebar-expand-lg sidebar-open bg-body-tertiary">
    <div class="app-wrapper daily-tasks-page">
      <nav class="app-header navbar navbar-expand bg-body shadow-sm">
        <div class="container-fluid">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link" data-lte-toggle="sidebar" href="#" role="button"><i class="bi bi-list"></i></a>
            </li>
            <li class="nav-item d-none d-md-block"><a href="./worker_daily_tasks.html" class="nav-link fw-semibold">일일업무</a></li>
          </ul>
          <ul class="navbar-nav ms-auto align-items-center gap-2">
            <li class="nav-item"><span class="nav-link text-dark" id="header-role-label">-</span></li>
            <li class="nav-item"><button type="button" class="btn btn-outline-danger btn-sm" id="logout-btn">로그아웃</button></li>
          </ul>
        </div>
      </nav>

      <aside class="app-sidebar bg-body-secondary shadow" data-bs-theme="dark" id="tetra-sidebar-aside">
        <div id="tetra-sidebar-inject"></div>
      </aside>

      <main class="app-main">
        <div class="app-content-header">
          <div class="container-fluid">
            <div class="row">
              <div class="col-sm-6"><h3 class="mb-0">일일업무</h3></div>
              <div class="col-sm-6">
                <ol class="breadcrumb float-sm-end mb-0">
                  <li class="breadcrumb-item"><a href="./home.html">홈</a></li>
                  <li class="breadcrumb-item" id="breadcrumb-parent"><a href="./manager.html" id="breadcrumb-parent-link">근태 관리</a></li>
                  <li class="breadcrumb-item active" aria-current="page">일일업무</li>
                </ol>
              </div>
            </div>
          </div>
        </div>
        <div class="app-content">
          <div class="container-fluid">
            <div class="row g-4">
              <!-- 일일업무 내역 -->
              <div class="col-12">
                <div class="card">
                  <div class="card-header d-flex flex-wrap align-items-center justify-content-between gap-2">
                    <h3 class="card-title mb-0"><i class="bi bi-list-check me-2"></i>일일업무 내역</h3>
                    <button type="button" class="btn btn-sm btn-outline-secondary" id="refresh-task-list-btn"><i class="bi bi-arrow-clockwise me-1"></i>새로고침</button>
                  </div>
                  <div class="card-body">
                    <div class="filter-bar d-flex flex-wrap align-items-center gap-2">
                      <label class="mb-0 text-muted small">날짜</label>
                      <input type="date" class="form-control form-control-sm" id="filter-date" style="width: auto;" />
                      <span class="d-none d-md-inline text-muted">|</span>
                      <label class="mb-0 text-muted small me-1">직원</label>
                      <input type="text" class="form-control form-control-sm" id="filter-worker" placeholder="전체 (비우면 전체)" style="width: 140px;" />
                      <button type="button" class="btn btn-sm btn-primary" id="apply-filter-btn">조회</button>
                    </div>
                    <div class="table-responsive">
                      <table class="table table-bordered table-hover table-striped mb-0">
                        <thead>
                          <tr>
                            <th>날짜</th>
                            <th>이름</th>
                            <th>업무유형</th>
                            <th>상세</th>
                            <th>등록시간</th>
                          </tr>
                        </thead>
                        <tbody id="task-tbody">
                          <tr><td colspan="5" class="text-center text-muted py-4">로딩 중...</td></tr>
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>

      <footer class="app-footer">
        <div class="float-end d-none d-sm-inline">일일업무</div>
        <strong>Copyright &copy; 2014-2025 <a href="https://adminlte.io" class="text-decoration-none">AdminLTE.io</a>.</strong> All rights reserved.
      </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/overlayscrollbars@2.11.0/browser/overlayscrollbars.browser.es6.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="./js/routes.js"></script>
    <script src="./js/adminlte.js"></script>
    <script src="./js/sidebar-master.js"></script>
    <script src="./js/sidebar-static.js"></script>
    <script src="./js/header-role.js"></script>
    <script>
      var role = localStorage.getItem('role');
      var userName = localStorage.getItem('userName');
      var canAccess = (role === 'Admin' || role === 'Manager') && !!userName;
      if (!userName) {
        if (typeof Swal !== 'undefined') Swal.fire({ icon: 'warning', title: '로그인 필요', text: '로그인 후 이용해 주세요.' }).then(function () { location.href = './login.html'; });
        else location.href = './login.html';
      } else if (!canAccess) {
        if (typeof Swal !== 'undefined') Swal.fire({ icon: 'error', title: '접근 거부', text: '매니저 또는 관리자만 이용할 수 있습니다.' }).then(function () { location.href = './home.html'; });
        else location.href = './home.html';
      }

      var API_URL = 'https://script.google.com/macros/s/AKfycbzFf_YuMxN3hkpPW6sFRKoblztRRf9yfrUMo6BJZ-WeFzYUNQHq4FybW3R_LnzwP9IxxA/exec';

      document.getElementById('logout-btn').addEventListener('click', function () {
        localStorage.removeItem('userName');
        localStorage.removeItem('role');
        location.href = './login.html';
      });

      if (!canAccess) { document.getElementById('task-tbody').innerHTML = '<tr><td colspan="5" class="text-center text-muted py-4">접근 권한이 없습니다.</td></tr>'; } else {
      var breadcrumbParent = document.getElementById('breadcrumb-parent');
      var breadcrumbParentLink = document.getElementById('breadcrumb-parent-link');
      if (breadcrumbParent && breadcrumbParentLink) {
        if (role === 'Admin') {
          breadcrumbParentLink.href = './admin.html';
          breadcrumbParentLink.textContent = '관리 콘솔';
        } else {
          breadcrumbParentLink.href = './manager.html';
          breadcrumbParentLink.textContent = '근태 관리';
        }
      }

      var filterDateEl = document.getElementById('filter-date');
      var filterWorkerEl = document.getElementById('filter-worker');
      if (filterDateEl && !filterDateEl.value) {
        filterDateEl.value = new Date().toISOString().slice(0, 10);
      }

      function escapeHtml(s) {
        var d = document.createElement('div');
        d.textContent = String(s == null ? '' : s);
        return d.innerHTML;
      }

      function loadTaskList() {
        var dateVal = filterDateEl.value || new Date().toISOString().slice(0, 10);
        var workerVal = (filterWorkerEl && filterWorkerEl.value) ? filterWorkerEl.value.trim() : '';

        var url = API_URL + '?action=getDailyTaskList&limit=500';
        if (dateVal) url += '&date=' + encodeURIComponent(dateVal);
        if (workerVal) url += '&workerName=' + encodeURIComponent(workerVal);

        var tbody = document.getElementById('task-tbody');
        tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4"><span class="spinner-border spinner-border-sm me-2"></span>로딩 중...</td></tr>';

        fetch(url)
          .then(function (r) { return r.json(); })
          .then(function (data) {
            var tasks = data.tasks || [];
            if (tasks.length === 0) {
              tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-4">조건에 맞는 내역이 없습니다.</td></tr>';
              return;
            }
            tbody.innerHTML = tasks.map(function (t) {
              return '<tr><td>' + escapeHtml(t.date || '-') + '</td><td>' + escapeHtml(t.workerName || '-') + '</td><td>' + escapeHtml(t.type || '-') + '</td><td>' + escapeHtml(t.detail || '-') + '</td><td>' + escapeHtml(t.time || '-') + '</td></tr>';
            }).join('');
          })
          .catch(function () {
            tbody.innerHTML = '<tr><td colspan="5" class="text-center text-danger py-4">데이터를 불러오지 못했습니다.</td></tr>';
          });
      }

      document.getElementById('refresh-task-list-btn').addEventListener('click', loadTaskList);
      document.getElementById('apply-filter-btn').addEventListener('click', loadTaskList);
      if (filterDateEl) filterDateEl.addEventListener('change', loadTaskList);

      loadTaskList();
      }
    </script>
  </body>
</html>
